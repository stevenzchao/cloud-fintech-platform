name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-service:
    name: auth-service (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Test (auth-service)
        working-directory: auth-service
        run: ../mvnw -ntp test

  tx-service:
    name: tx-service (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 + Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test (tx-service)
        working-directory: tx-service
        run: ../mvnw -ntp test

  docker-build:
    name: docker (build images)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        run: docker build -t cloud-fintech/auth-service:ci ./auth-service

      - name: Build tx-service image
        run: docker build -t cloud-fintech/tx-service:ci ./tx-service

  smoke:
    name: smoke(docker compose +curl)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: smoke test
        run: bash ci/smoke.sh

      - name: Dump logs on failure
        if: failure()
        run:
          docker compose ps
          docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down -v