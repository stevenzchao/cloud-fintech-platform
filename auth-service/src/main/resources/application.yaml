spring:
  application:
    name: auth-service
server:
  port: 8081

security:
  jwt:
    issuer: cloud-fintech-auth
    audience: cloud-fintech-tx
    secret: "CHANGE-ME-IN-DEV-ONLY-AT-LEAST-32-CHARS-LONG"
    access-token-minutes: 15


---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintech}
    username: ${DB_USER:fintech}
    password: ${DB_PASSWORD:fintech}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintech}
    username: ${DB_USER:fintech}
    password: ${DB_PASSWORD:fintech}
