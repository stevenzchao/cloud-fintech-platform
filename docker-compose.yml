services:
  postgres:
    image: postgres:16
    container_name: cfp-postgres
    environment:
      POSTGRES_DB: fintech
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cfp-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: ./auth-service
    container_name: cfp-auth
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fintech
      DB_USER: fintech
      DB_PASSWORD: fintech
      SERVER_PORT: "8081"
    depends_on:
      - postgres
    networks:
      - cfp-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  tx-service:
    build:
      context: ./tx-service
    container_name: cfp-tx
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fintech
      DB_USER: fintech
      DB_PASSWORD: fintech
      SERVER_PORT: "8082"
    depends_on:
      - postgres
    networks:
      - cfp-net

  nginx:
    image: nginx:1.27
    container_name: cfp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - tx-service
    networks:
      - cfp-net

volumes:
  pgdata:

networks:
  cfp-net:
    driver: bridge